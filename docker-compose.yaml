services:
  postgres:
    image: postgres:18
    container_name: smarttasks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smart
      POSTGRES_PASSWORD: smart
      POSTGRES_DB: smarttasks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  minio:
    image: minio/minio
    container_name: smarttasks-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 10;
        mc alias set myminio http://minio:9000 admin password;
        mc mb myminio/my-bucket;
        mc admin accesskey create myminio/ minioadmin --access-key gMqTmkWI7louRVP5lcFf --secret-key xf3fF0YEslRnrfRIxhrop1VYxXeAnfEr4uJIxWZD
      "

volumes:
  postgres_data:
  minio_data:
